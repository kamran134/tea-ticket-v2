server {
    listen 80;
    server_name tea-ticket.com www.tea-ticket.com;

    # Redirect www → non-www
    if ($host = www.tea-ticket.com) {
        return 301 https://tea-ticket.com$request_uri;
    }

    # Let Certbot handle HTTP challenge, redirect everything else to HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://tea-ticket.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.tea-ticket.com;

    ssl_certificate     /etc/letsencrypt/live/tea-ticket.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tea-ticket.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://tea-ticket.com$request_uri;
}

server {
    listen 443 ssl;
    server_name tea-ticket.com;

    ssl_certificate     /etc/letsencrypt/live/tea-ticket.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tea-ticket.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # Frontend static
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
