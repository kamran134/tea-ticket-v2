server {
    listen 80;
    server_name tea-ticket.com www.tea-ticket.com;

    # Redirect all HTTP to HTTPS (Cloudflare handles the outer HTTPS)
    return 301 https://tea-ticket.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.tea-ticket.com;

    ssl_certificate     /etc/ssl/tea-ticket/origin.pem;
    ssl_certificate_key /etc/ssl/tea-ticket/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://tea-ticket.com$request_uri;
}

server {
    listen 443 ssl;
    server_name tea-ticket.com;

    ssl_certificate     /etc/ssl/tea-ticket/origin.pem;
    ssl_certificate_key /etc/ssl/tea-ticket/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # Frontend static
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
